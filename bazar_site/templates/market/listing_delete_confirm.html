{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card p-4 p-md-5">
            <h1 class="h5 mb-3 text-center">Удалить объявление</h1>
            <p class="text-muted mb-4 text-center">
                Вы действительно хотите удалить объявление «{{ listing.title }}»? Это действие нельзя отменить.
            </p>
            <form method="post" class="d-flex flex-column gap-2">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Удалить безвозвратно</button>
                <a href="{% url 'market:listing_detail' listing.pk %}" class="btn btn-outline-light">Отмена</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
