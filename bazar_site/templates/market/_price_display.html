<span class="price-with-logo">
    <span class="price-logo" title="{{ currency }}" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="1.2em" height="1.2em" fill="currentColor">
            <g transform="translate(12, 12)">
                <text x="0" y="0" text-anchor="middle" dominant-baseline="central" font-size="24" font-weight="700" fill="currentColor">¤</text>
            </g>
        </svg>
    </span>
    <span class="price-amount">{{ amount }}</span>
    <span class="price-currency">{{ currency }}</span>
</span>
