{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="d-flex justify-content-center align-items-center ban-wrapper">
    <div class="text-center">
        <h1 class="display-6 fw-bold text-danger ban-title">
            ВАШ АККАУНТ ЗАБЛОКИРОВАН
        </h1>
        {% if ban_reason %}
            <p class="mt-3 text-muted">
                Причина: {{ ban_reason }}
            </p>
        {% endif %}
        <p class="mt-4 small text-muted ban-text">
            Если вы считаете, что это ошибка, свяжитесь с администрацией проекта.
        </p>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
{{ block.super }}
<link rel="stylesheet" href="{% static 'market/css/ban.css' %}">
{% endblock %}
