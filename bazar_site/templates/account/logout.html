{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card p-4 p-md-5 text-center">
            <h1 class="h4 mb-3">Выйти из BAZAR</h1>
            <p class="text-muted mb-4">
                Вы действительно хотите выйти из своей учётной записи?
            </p>
            <form method="post" class="d-inline">
                {% csrf_token %}
                <button type="submit" class="btn btn-starbaz">Выйти</button>
                <a href="/" class="btn btn-outline-light ms-2">Отмена</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
