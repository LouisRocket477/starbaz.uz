##
## Пример конфига nginx для BAZAR
##
## Путь: /etc/nginx/sites-available/bazar
## Затем:
##   ln -s /etc/nginx/sites-available/bazar /etc/nginx/sites-enabled/bazar
##   nginx -t && systemctl reload nginx
##

upstream bazar_gunicorn {
    server 127.0.0.1:8000;
}

limit_req_zone $binary_remote_addr zone=bazar_limit:10m rate=5r/s;

server {
    listen 80;
    server_name bazar.example.com;

    client_max_body_size 20M;

    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy same-origin;

    location /static/ {
        alias /srv/bazar_site/static/;
    }

    location /media/ {
        alias /srv/bazar_site/media/;
    }

    location / {
        proxy_pass http://bazar_gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        limit_req zone=bazar_limit burst=20 nodelay;
    }
}

